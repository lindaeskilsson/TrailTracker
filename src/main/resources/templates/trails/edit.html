<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Trail</title>
</head>
<body>
<h1>Redigera trail</h1>

<form th:action="@{/trails/{id}/edit(id=${trailId})}" th:object="${trail}" method="post">

    <div th:if="${#fields.hasAnyErrors()}">
        Kontrollera formuläret och rätta felen nedan
    </div>

    <label for="name">Namn:</label>
    <input type="text" id="name" th:field="*{name}">
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

    <label for="distanceKm">Distans:</label>
    <input type="number" id="distanceKm" th:field="*{distanceKm}">
    <div th:if="${#fields.hasErrors('distanceKm')}" th:errors="*{distanceKm}"></div>

    <label for="timeMinutes">Tid:</label>
    <input type="number" id="timeMinutes" th:field="*{timeMinutes}" />
    <div th:if="${#fields.hasErrors('timeMinutes')}" th:errors="*{timeMinutes}"></div>

    <label for="eleveationGain">Höjdmeter:</label>
    <input type="number" id="eleveationGain" th:field="*{elevationGain}" />
    <div th:if="${#fields.hasErrors('elevationGain')}" th:errors="*{elevationGain}"></div>

    <label for="description">Beskrivning:</label>
    <input type="text" id="description" th:field="*{description}" />
    <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

    <label for="location">Plats:</label>
    <input type="text" id="location" th:field="*{location}" />
    <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>

    <button type="submit">Spara ändringar</button>
</form>

</body>
</html>
