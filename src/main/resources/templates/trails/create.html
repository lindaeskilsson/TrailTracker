<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Skapa trail</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Skapa ny trail</h1>

<form th:action="@{/trails/new}" th:object="${trail}" method="post">

    <div th:if="${#fields.hasAnyErrors()}">
        Kontrollera formuläret och rätta felen nedan
    </div>

    <div>
        <label>Namn:</label>
        <input type="text" th:field="*{name}" />
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div>
        <label>Distans (km):</label>
        <input type="number" step="0.1" th:field="*{distanceKm}" />
        <div th:if="${#fields.hasErrors('distanceKm')}" th:errors="*{distanceKm}"></div>
    </div>

    <div>
        <label>Tid (min):</label>
        <input type="number" th:field="*{timeMinutes}" />
        <div th:if="${#fields.hasErrors('timeMinutes')}" th:errors="*{timeMinutes}"></div>
    </div>

    <div>
        <label>Höjdmeter:</label>
        <input type="number" th:field="*{elevationGain}" />
        <div th:if="${#fields.hasErrors('elevationGain')}" th:errors="*{elevationGain}"></div>
    </div>

    <div>
        <label>Beskrivning:</label>
        <input type="text" th:field="*{description}" />
        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
    </div>

    <div>
        <label>Plats:</label>
        <input type="text" th:field="*{location}" />
        <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
    </div>

    <button type="submit">Spara</button>
</form>

</body>
</html>
